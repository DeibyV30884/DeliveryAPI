services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: delivery_sqlserver
    platform: linux/amd64
    environment:
      SA_PASSWORD: "DeliveryPass123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data: